<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>授权成功</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">
  <h1>✅ TikTok 授权成功！</h1>
  请复制下方 URL 中的 code 参数，用于换取 access_token：
  <p id="url-display" style="word-break: break-all; color: #666;">
  <script>
    // 自动提取 URL 中的 code 并显示出来，方便你调试
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('url-display').innerText = window.location.href;
      console.log("🔑 授权码 (code):", code);
    } else {
      document.getElementById('url-display').innerText = "❌ 未获取到 code，请检查授权流程。";
    }
  </script>
</body>
</html>
